    <title>Reset Password</title>
  </head>
  <body>
    <h2>Reset Password</h2>

    <form method="POST">
      <input
        type="password"
        name="password"
        placeholder="Enter new password"
        required
      />
      <button type="submit">Reset Password</button>
    </form>
  </body>
