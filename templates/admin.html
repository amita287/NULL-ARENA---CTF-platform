<!--admin.html-->
<!doctype html>
<html>
  <head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/css/admin.css" />
  </head>

  <body>
    <!-- 🔷 NAVBAR -->
    <div class="navbar">
      <div class="nav-left">
        <div class="nav-item">🏁</div>
        <div class="nav-item" data-action="users">Users</div>
        <div class="nav-item" data-action="scoreboard">Scoreboard</div>

        <!-- ✅ THIS SHOWS CHALLENGES -->
        <div class="nav-item" data-action="view">Challenges</div>

        <div class="nav-item" data-action="logs">Logs</div>
      </div>

      <div class="nav-right">
        <div class="nav-item" data-action="dashboard">Dashboard</div>
        <div class="nav-item" data-action="logout">Logout</div>
      </div>
    </div>

    <!-- 📦 CONTENT -->
    <div class="container">
      <!-- ➕ ADD BUTTON -->
      <div class="tabs" id="addBtnContainer" style="display: none">
        <button class="add-btn" data-action="add">Add Challenge</button>
      </div>

      <!-- ➕ ADD FORM (HIDDEN BY DEFAULT) -->
      <div id="addSection" style="display: none">
        <div class="terminal">
          <div>admin@ctf:~$ create_challenge</div>

          <input id="title" placeholder="challenge_name" />
          <textarea id="description" placeholder="description"></textarea>
          <input id="category" placeholder="category" />
          <input id="author" placeholder="author" />
          <input id="points" placeholder="points" />
          <input id="file_link" placeholder="file link" />
          <input id="flag" placeholder="CTF{flag}" />

          <button data-action="addChallenge">Execute</button>
        </div>
      </div>

      <!-- 📋 VIEW (DEFAULT) -->
      <div id="viewSection">
        <div id="challengeContainer"></div>
      </div>

      <!-- 📜 LOGS -->
      <div id="logsSection" style="display: none">
        <div id="logsContainer"></div>
      </div>
    </div>

    <div id="challengeModal" class="modal hidden">
      <div class="modal-box"></div>
    </div>

    <script src="/static/js/admin.js" defer></script>
  </body>
</html>
